<section>
  <div class="k-section-head">
    <div class="k-section-head__eyebrow">06 / FAQ</div>
    <h2 class="k-section-head__title">Common <em>Questions</em></h2>
    <p class="k-section-head__sub">AI-optimized Q and A blocks for answer panels and assistant retrieval.</p>
  </div>

  <div class="k-faq-list">
    <article class="k-faq-item" *ngFor="let faq of faqs; let i = index" [class.is-open]="openIndex === i">
      <button type="button" class="k-faq-item__q" (click)="toggle(i)">
        <span>{{ faq.question }}</span>
        <strong>{{ openIndex === i ? '-' : '+' }}</strong>
      </button>
      <div class="k-faq-item__a">{{ faq.answer }}</div>
    </article>
  </div>
</section>
